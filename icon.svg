<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background: rounded square -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="#1a1a1a"/>

  <!-- Tape reels -->
  <circle cx="96" cy="108" r="36" fill="none" stroke="#e8e8e8" stroke-width="3"/>
  <circle cx="96" cy="108" r="12" fill="#e8e8e8"/>
  <circle cx="160" cy="108" r="36" fill="none" stroke="#e8e8e8" stroke-width="3"/>
  <circle cx="160" cy="108" r="12" fill="#e8e8e8"/>

  <!-- Tape path between reels -->
  <path d="M 60 108 A 36 36 0 0 1 96 72 L 160 72 A 36 36 0 0 1 196 108"
        fill="none" stroke="#e8e8e8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- USB arrow / transfer indicator -->
  <g transform="translate(128, 186)">
    <!-- Arrow pointing right -->
    <line x1="-28" y1="0" x2="20" y2="0" stroke="#ff5722" stroke-width="5" stroke-linecap="round"/>
    <polyline points="10,-10 22,0 10,10" fill="none" stroke="#ff5722" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Small "MTP" label -->
  <text x="128" y="218" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
        font-size="16" font-weight="bold" fill="#ff5722" letter-spacing="2">MTP</text>
</svg>
