name: Publish APT repo

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build .deb"]
    types: [completed]

jobs:
  publish:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      KEY_ID: ${{ secrets.KEY_ID }}
      CODENAMES: "noble jammy"
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y reprepro gnupg

      - name: Set up GPG
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "$KEY_ID:6:" | gpg --batch --import-ownertrust

      - name: Set up APT repo
        run: |
          mkdir -p repo/conf
          for codename in ${CODENAMES}; do
          cat <<EOF >>repo/conf/distributions
          Codename: ${codename}
          Components: main
          Architectures: amd64 arm64 i386
          Origin: sparkyfen
          Label: tp7-mtp
          SignWith: ${KEY_ID}

          EOF
          done
          gpg --batch --export "$KEY_ID" > repo/pubkey.gpg
          gpg --batch --armor --export "$KEY_ID" > repo/pubkey.asc
          touch repo/index.html

      - name: Download debs from releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASES="$(gh -R ${{ github.repository }} release list --json tagName -t '{{range .}}{{.tagName}} {{end}}')"
          for release in $RELEASES; do
            echo "Processing release: $release"
            rm -rf debtmp && mkdir debtmp
            gh -R ${{ github.repository }} release download --dir debtmp --pattern '*.deb' "$release" || continue
            for codename in ${CODENAMES}; do
              for f in debtmp/*${codename}*.deb; do
                [ -f "$f" ] || continue
                echo "  Adding $f to $codename"
                reprepro -C main -Vb repo includedeb "$codename" "$f"
              done
            done
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: repo/

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
