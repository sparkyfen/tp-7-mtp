name: Build .deb

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        codename: [noble, jammy]
    steps:
      - uses: actions/checkout@v4

      - name: Build .deb
        run: bash build-deb.sh "${GITHUB_REF_NAME#v}" "${{ matrix.codename }}"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.codename }}
          path: build/*.deb

  upload:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all deb artifacts
        uses: actions/download-artifact@v4
        with:
          path: debs/
          merge-multiple: true

      - name: Create release if needed and upload debs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            2>/dev/null || true
          gh release upload "$GITHUB_REF_NAME" debs/*.deb \
            --repo "$GITHUB_REPOSITORY" --clobber
